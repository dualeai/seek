name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      # Install SBOM tools
      - uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      # SBOM generation (project-level, CycloneDX format)
      - name: Generate SBOM
        run: syft scan . --output cyclonedx-json=sbom.cyclonedx.json
      - name: Validate SBOM
        run: jq empty sbom.cyclonedx.json

      # Install goreleaser
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          install-only: true

      # Build, archive, checksum, sign, and publish GitHub release
      - run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Supply chain attestations (SLSA L2)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
      - name: Attest SBOM
        uses: actions/attest-sbom@07e74fc4e78d1aad915e867f9a094073a9f71527 # v4.0.0
        with:
          subject-path: dist/*.tar.gz
          sbom-path: sbom.cyclonedx.json
