name: Release

on:
  push:
    tags: ["v*"]

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod

      # SBOM generation (project-level, CycloneDX format)
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: syft scan . --output cyclonedx-json=sbom.cyclonedx.json
      - name: Validate SBOM
        run: jq empty sbom.cyclonedx.json

      # Build, archive, checksum, and publish GitHub release
      - uses: goreleaser/goreleaser-action@v6.3.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Supply chain attestations (SLSA L3 compatible)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
      - name: Attest SBOM
        uses: actions/attest-sbom@v3.0.0
        with:
          subject-path: dist/*.tar.gz
          sbom-path: sbom.cyclonedx.json
