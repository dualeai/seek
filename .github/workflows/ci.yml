name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
      - run: make install
      - run: make test-static

  test-unit:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86_64
          - ubuntu-24.04-arm    # Linux arm64
          - macos-latest        # macOS arm64
          - macos-26-intel      # macOS x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
      - run: make test-unit

  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86_64
          - ubuntu-24.04-arm    # Linux arm64
          - macos-latest        # macOS arm64
          - macos-26-intel      # macOS x86_64
    runs-on: ${{ matrix.os }}
    needs: [test-static, test-unit]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
      - run: make build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: seek-${{ matrix.os }}
          path: seek
